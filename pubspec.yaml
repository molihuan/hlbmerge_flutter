name: hlbmerge
description: "A new Flutter project."
publish_to: 'none'

version: 3.0.0+300

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  # ffmpeg_hl
  ffmpeg_hl:
    path: ./ffmpeg_xmake
  # 状态管理 https://github.com/rrousselGit/riverpod
  flutter_riverpod: ^3.2.1
  hooks_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  # 路由 https://pub-web.flutter-io.cn/packages/go_router
  go_router: ^17.0.0
  # 文件选择 TODO可以升级
  file_picker_ohos:
    git:
      url: https://gitcode.com/CPF-Flutter/fluttertpc_file_picker.git
      path: ./
      ref: br_v10.3.8_ohos
  # url
  url_launcher:
    git:
      url: https://gitcode.com/CPF-Flutter/flutter_packages.git
      path: packages/url_launcher/url_launcher
      ref: br_url_launcher_v6.3.1_ohos
  # kv存储 https://pub-web.flutter-io.cn/packages/hive_ce
  #  hive_ce_flutter: ^2.3.4
  # https://github.com/Tencent/MMKV
  mmkv: ^2.4.0
  # 实体类序列化 https://github.com/rrousselGit/freezed
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  # 元组工具
  tuple: ^2.0.2
  # 分享
  share_plus:
    git:
      url: https://gitcode.com/CPF-Flutter/flutter_plus_plugins.git
      path: packages/share_plus/share_plus
      ref: br_share_plus-v10.1.1_ohos
  # 包信息
  package_info_plus:
    git:
      url: https://gitcode.com/CPF-Flutter/flutter_plus_plugins.git
      path: packages/package_info_plus/package_info_plus
      ref: br_package_info_plus-v9.0.0_ohos
  # 拖拽
  desktop_drop:
    git:
      url: https://gitee.com/molihuan/flutter-plugins.git
      path: packages/desktop_drop
  # 日志
  logger: ^2.7.0
  # 吐司
  toastification: ^3.0.3
  bot_toast: ^4.1.3

  # 网络请求
  http: ^1.6.0
  # 窗口管理
  nativeapi: ^0.1.4

dependency_overrides:
  #强制覆盖
  test_api: 0.7.11
  web: 1.1.1
  path_provider:
    git:
      url: https://gitcode.com/CPF-Flutter/flutter_packages.git
      path: packages/path_provider/path_provider
      ref: master

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # dart run build_runner build
  # dart run build_runner watch
  build_runner: ^2.12.2
  #序列化
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  # 生成平台代码,通过git的方式拉取有问题:https://gitcode.com/openharmony-tpc/flutter_packages/tree/br_pigeon-v26.1.5_ohos
  # 所以暂时使用本地的pigeon
  # dart run pigeon --input pigeons/api.dart
  pigeon:
    path: ./third_party/pigeon26.1.5
  # 资源强类型
  flutter_gen_runner: ^5.14.1


flutter_gen:
  output: lib/generate/gen/
  integrations:
    image: true
    flutter_svg: true
    rive: false
    lottie: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
